<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1f3d">
<title>VidéoDossier Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#0f1f3d;--blue:#1a3a6b;--gold:#c8a84b;--bg:#f2f0eb;--card:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#e2ddd6}
body{font-family:-apple-system,system-ui,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px}
.header{background:var(--navy);padding:14px 20px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header-top{display:flex;align-items:center;gap:12px}
.hicon{width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.htitle{font-size:17px;font-weight:700;color:#fff}
.hsub{font-size:11px;color:#7a9cc0;letter-spacing:.8px;text-transform:uppercase;margin-top:1px}
.sbar{background:var(--blue);padding:8px 20px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.sbar::-webkit-scrollbar{display:none}
.sp{padding:5px 12px;border-radius:20px;font-size:12px;white-space:nowrap;cursor:pointer;border:1px solid transparent;flex-shrink:0}
.sp.active{background:var(--gold);color:var(--navy);font-weight:700}
.sp.done{background:rgba(200,168,75,.2);color:var(--gold);border-color:var(--gold)}
.sp.pending{color:#4a6080}
.main{padding:16px}
.card{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ch{background:#f8f6f2;padding:13px 16px;border-bottom:1px solid var(--border)}
.ct{font-size:15px;font-weight:700;color:var(--navy)}
.cs{font-size:12px;color:var(--muted);margin-top:2px}
.cb{padding:16px}
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
label.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
input[type=text],input[type=number],input[type=email],input[type=tel],textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;background:#fff;color:var(--text);-webkit-appearance:none;appearance:none;outline:none}
input:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,168,75,.15)}
textarea{resize:vertical;min-height:90px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tr{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0ede8}
.tr:last-child{border-bottom:none}
.tl{font-size:14px;color:var(--text)}
.ts{font-size:12px;color:var(--muted);margin-top:2px}
.tsw{width:46px;height:26px;background:#d1d5db;border-radius:13px;position:relative;cursor:pointer;flex-shrink:0;margin-left:12px;transition:background .2s}
.tsw.on{background:var(--navy)}
.tsw::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tsw.on::after{left:23px}
.cc{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;background:#fff;-webkit-user-select:none;user-select:none}
.cc.checked{background:#eef3ff;border-color:#3b82f6}
.cbox{width:22px;height:22px;border:2px solid #d1d5db;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.cc.checked .cbox{background:#3b82f6;border-color:#3b82f6;color:#fff}
.alert{border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start;line-height:1.4}
.aw{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412}
.ai{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.ag{background:#f0fdf4;border:1px solid #bbf7d0;color:#14532d}
.navb{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,.08)}
.bp{flex:1;padding:14px;background:transparent;border:1.5px solid var(--border);border-radius:12px;font-size:15px;color:var(--muted);cursor:pointer;font-family:inherit}
.bn{flex:2;padding:14px;background:var(--navy);border:none;border-radius:12px;font-size:15px;color:#fff;cursor:pointer;font-weight:700;font-family:inherit}
.isec{margin-bottom:22px}
.istitle{font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dz{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;background:#fafaf8;position:relative;min-height:90px}
.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.btn-paste{width:100%;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.ph{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:12px;color:#92400e;margin-top:8px;line-height:1.4}
.igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.ithumb{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;border:1px solid var(--border)}
.ithumb img{width:100%;height:100%;object-fit:cover;display:block}
.ilabel{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:3px 6px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iremove{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(220,38,38,.9);border:none;border-radius:50%;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.icap{width:100%;margin-top:4px;padding:5px 8px;font-size:12px;border:1px solid var(--border);border-radius:6px;font-family:inherit;background:#fff}
.badge{display:inline-block;background:var(--gold);color:var(--navy);border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700;margin-left:6px}
.loading{text-align:center;padding:48px 20px}
.lspinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;margin:0 auto 16px;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{display:flex;background:#f0ede8;border-radius:12px;padding:3px;gap:3px;margin-bottom:12px}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:12px;border-radius:9px;cursor:pointer;color:var(--muted);font-weight:600;border:none;background:transparent;font-family:inherit}
.tab.active{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.rout{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.rtbar{background:var(--navy);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.rttitle{color:#fff;font-size:12px;font-weight:700;letter-spacing:.5px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bsmall{padding:6px 14px;background:var(--gold);color:var(--navy);border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.rcontent{padding:20px 16px;font-size:14px;line-height:1.75;color:#2a2a2a;white-space:pre-wrap;max-height:380px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.cli{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid #f5f3ef}
.cli:last-child{border-bottom:none}
.clcirc{width:24px;height:24px;border:2px solid var(--gold);border-radius:5px;flex-shrink:0;margin-top:1px}
.cldoc{font-size:14px;font-weight:700}
.cldesc{font-size:12px;color:var(--muted);margin-top:2px}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.rc{background:#f8f6f2;border-radius:8px;padding:10px 12px}
.rk{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.rv{font-size:14px;font-weight:700;margin-top:2px}
.btn-gen{width:100%;padding:16px;background:var(--gold);border:none;border-radius:14px;font-size:16px;font-weight:700;color:var(--navy);cursor:pointer;font-family:inherit;margin-top:8px;box-shadow:0 4px 14px rgba(200,168,75,.35)}
.btn-pdf{width:100%;padding:16px;background:linear-gradient(135deg,#0f1f3d,#1a3a6b);border:none;border-radius:14px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(15,31,61,.35)}
.btn-new{width:100%;padding:13px;background:transparent;border:1.5px solid var(--border);border-radius:12px;font-size:14px;color:var(--muted);cursor:pointer;font-family:inherit;margin-top:8px}
.ios-hint{background:#f0f7ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 14px;font-size:12px;color:#1e40af;margin-bottom:10px;line-height:1.5}

/* ── PLAN EDITOR ── */
.plan-editor{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.plan-toolbar{background:var(--navy);padding:8px 12px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tool-btn{padding:7px 12px;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tool-btn.active{background:var(--gold);color:var(--navy)}
.tool-btn:not(.active){background:rgba(255,255,255,.12);color:#fff}
.tool-btn:not(.active):active{background:rgba(255,255,255,.25)}
.tool-sep{width:1px;height:24px;background:rgba(255,255,255,.2);flex-shrink:0}
.plan-canvas-wrap{position:relative;width:100%;background:#f0ede8;touch-action:none}
.plan-canvas-wrap canvas{display:block;width:100%;height:100%;cursor:crosshair}
.plan-hint-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.plan-hint-box{background:rgba(15,31,61,.75);color:#fff;padding:14px 20px;border-radius:10px;text-align:center;font-size:13px;line-height:1.5}
.plan-actions{padding:10px 12px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border)}
.plan-action-btn{padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;background:#fff;color:var(--navy);font-weight:600}
.plan-action-btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.plan-action-btn.danger{border-color:#fee2e2;color:#dc2626}
.fov-slider{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f8f6f2;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.fov-slider input{flex:1;accent-color:var(--gold)}
.cam-count-badge{background:var(--gold);color:var(--navy);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;margin-left:8px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="hicon">🎥</div>
    <div><div class="htitle">VidéoDossier Pro</div><div class="hsub">Dossier préfectoral · Vidéoprotection</div></div>
  </div>
</div>
<div class="sbar" id="sbar"></div>
<div class="main" id="mc"></div>
<div class="navb" id="nb"></div>

<script>
var STEPS=["Client","Installation","Finalités","Technique","Plan & Photos","Génération"];
var FINS=["Prévention des atteintes aux personnes et aux biens","Protection des bâtiments et installations","Régulation du trafic routier","Constatation des infractions aux règles de circulation","Prévention d'actes de terrorisme","Sécurité des installations à caractère sensible"];
var CATS=[
  {key:"photos_lieu",title:"Photos des lieux à surveiller",icon:"🏢",hint:"Photos prises sur place des zones à surveiller."},
  {key:"dmss",title:"Captures DMSS / configuration",icon:"📱",hint:"Interface DMSS, paramètres, zones de détection."}
];

// ── PLAN EDITOR STATE ──
var PLAN = {
  bgImage: null,       // Image object
  bgSrc: null,
  cameras: [],         // [{x,y,angle,fov,label,color}]
  arrows: [],          // [{x1,y1,x2,y2,color}]
  tool: 'camera',      // 'camera','arrow','select','delete'
  selected: null,      // {type:'camera'|'arrow', idx}
  dragging: false,
  dragStart: null,
  arrowStart: null,
  fovAngle: 70,
  camColor: '#e53935',
  exported: false
};

var PLAN_CANVAS = null;
var PLAN_CTX = null;
var CAM_COLORS = ['#e53935','#1565c0','#2e7d32','#f57f17','#6a1b9a','#00838f'];
var camColorIdx = 0;

var S={
  step:0,
  f:{nom:"",resp:"",adr:"",cp:"",ville:"",tel:"",email:"",activite:"",siret:"",
     cams:"",vp:false,fins:[],risque:"",conserv:"30",habilit:"2",
     enreg:true,tele:false,certif:true,installateur:"",obs:""},
  imgs:{plan_masse:[],photos_lieu:[],dmss:[]},
  rapport:"",cl:[],tab:"rapport",loading:false
};

function upd(k,v){S.f[k]=v;render()}
function tf(f){var a=S.f.fins,i=a.indexOf(f);if(i>=0)a.splice(i,1);else a.push(f);render()}
function countI(){var n=0;Object.keys(S.imgs).forEach(function(k){n+=S.imgs[k].length});return n}
function h(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

// ── CANVAS HELPERS ──
function initCanvas(){
  PLAN_CANVAS=document.getElementById("planCanvas");
  if(!PLAN_CANVAS)return;
  PLAN_CTX=PLAN_CANVAS.getContext("2d");
  resizeCanvas();
  bindCanvasEvents();
  drawPlan();
}

function resizeCanvas(){
  if(!PLAN_CANVAS)return;
  var wrap=PLAN_CANVAS.parentElement;
  var w=wrap.offsetWidth;
  var h=Math.min(w*0.65,400);
  PLAN_CANVAS.width=w;
  PLAN_CANVAS.height=h;
  PLAN_CANVAS.style.height=h+"px";
  drawPlan();
}

function drawPlan(){
  if(!PLAN_CTX||!PLAN_CANVAS)return;
  var ctx=PLAN_CTX,W=PLAN_CANVAS.width,H=PLAN_CANVAS.height;
  ctx.clearRect(0,0,W,H);

  // Background
  if(PLAN.bgImage){
    var scale=Math.min(W/PLAN.bgImage.width,H/PLAN.bgImage.height);
    var bw=PLAN.bgImage.width*scale,bh=PLAN.bgImage.height*scale;
    var bx=(W-bw)/2,by=(H-bh)/2;
    ctx.drawImage(PLAN.bgImage,bx,by,bw,bh);
  }else{
    ctx.fillStyle="#f8f6f2";ctx.fillRect(0,0,W,H);
    // Grid
    ctx.strokeStyle="#e2ddd6";ctx.lineWidth=1;
    for(var gx=40;gx<W;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke()}
    for(var gy=40;gy<H;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke()}
  }

  // Arrows
  PLAN.arrows.forEach(function(a,i){
    var sel=PLAN.selected&&PLAN.selected.type==="arrow"&&PLAN.selected.idx===i;
    drawArrow(ctx,a.x1,a.y1,a.x2,a.y2,a.color||"#1565c0",sel?3:2,sel);
  });

  // Arrow in progress
  if(PLAN.tool==="arrow"&&PLAN.arrowStart){
    drawArrow(ctx,PLAN.arrowStart.x,PLAN.arrowStart.y,PLAN.arrowStart.cx||PLAN.arrowStart.x,PLAN.arrowStart.cy||PLAN.arrowStart.y,"#1565c0",2,false);
  }

  // Cameras
  PLAN.cameras.forEach(function(cam,i){
    var sel=PLAN.selected&&PLAN.selected.type==="camera"&&PLAN.selected.idx===i;
    drawCamera(ctx,cam.x,cam.y,cam.angle,cam.fov||PLAN.fovAngle,cam.color||"#e53935",cam.label||(i+1),sel);
  });
}

function drawArrow(ctx,x1,y1,x2,y2,color,lw,sel){
  var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<5)return;
  ctx.save();
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=lw;
  if(sel){ctx.shadowColor="rgba(200,168,75,.8)";ctx.shadowBlur=8}
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  // Arrowhead
  var angle=Math.atan2(dy,dx);
  var hLen=12,hAngle=0.45;
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hLen*Math.cos(angle-hAngle),y2-hLen*Math.sin(angle-hAngle));
  ctx.lineTo(x2-hLen*Math.cos(angle+hAngle),y2-hLen*Math.sin(angle+hAngle));
  ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawCamera(ctx,x,y,angle,fov,color,label,selected){
  ctx.save();
  var rad=angle*Math.PI/180;
  var fovRad=fov*Math.PI/180;
  var dist=80;

  // FOV triangle
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x+dist*Math.cos(rad-fovRad/2),y+dist*Math.sin(rad-fovRad/2));
  ctx.arc(x,y,dist,-Math.PI/2+rad-fovRad/2+Math.PI/2,(-Math.PI/2+rad+fovRad/2+Math.PI/2));
  ctx.lineTo(x+dist*Math.cos(rad+fovRad/2),y+dist*Math.sin(rad+fovRad/2));
  ctx.closePath();
  ctx.fillStyle=hexToRgba(color,0.18);
  ctx.fill();
  ctx.strokeStyle=hexToRgba(color,0.7);
  ctx.lineWidth=selected?2:1.5;
  if(selected){ctx.shadowColor="rgba(200,168,75,.9)";ctx.shadowBlur=12}
  ctx.stroke();

  // Camera body
  ctx.translate(x,y);ctx.rotate(rad);
  // Body rect
  ctx.fillStyle=color;
  ctx.beginPath();ctx.roundRect(-10,-7,20,14,3);ctx.fill();
  // Lens
  ctx.fillStyle="#fff";
  ctx.beginPath();ctx.arc(6,0,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=color;
  ctx.beginPath();ctx.arc(6,0,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#fff";
  ctx.beginPath();ctx.arc(7,-1,1,0,Math.PI*2);ctx.fill();
  // Mount
  ctx.fillStyle="#333";
  ctx.beginPath();ctx.roundRect(-4,7,8,6,2);ctx.fill();
  ctx.restore();

  // Label badge
  ctx.save();
  ctx.fillStyle=color;
  ctx.beginPath();ctx.arc(x+12,y-12,9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 10px -apple-system,system-ui,sans-serif";
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText(String(label),x+12,y-12);
  ctx.restore();
}

function hexToRgba(hex,alpha){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return"rgba("+r+","+g+","+b+","+alpha+")";
}

function getPos(e,canvas){
  var rect=canvas.getBoundingClientRect();
  var scaleX=canvas.width/rect.width;
  var scaleY=canvas.height/rect.height;
  var clientX,clientY;
  if(e.touches&&e.touches.length>0){clientX=e.touches[0].clientX;clientY=e.touches[0].clientY}
  else if(e.changedTouches&&e.changedTouches.length>0){clientX=e.changedTouches[0].clientX;clientY=e.changedTouches[0].clientY}
  else{clientX=e.clientX;clientY=e.clientY}
  return{x:(clientX-rect.left)*scaleX,y:(clientY-rect.top)*scaleY};
}

function hitCamera(x,y){
  for(var i=PLAN.cameras.length-1;i>=0;i--){
    var c=PLAN.cameras[i];
    var dx=x-c.x,dy=y-c.y;
    if(Math.sqrt(dx*dx+dy*dy)<16)return i;
  }
  return -1;
}

function bindCanvasEvents(){
  var c=PLAN_CANVAS;
  c.addEventListener("mousedown",onDown);
  c.addEventListener("mousemove",onMove);
  c.addEventListener("mouseup",onUp);
  c.addEventListener("touchstart",function(e){e.preventDefault();onDown(e)},{passive:false});
  c.addEventListener("touchmove",function(e){e.preventDefault();onMove(e)},{passive:false});
  c.addEventListener("touchend",function(e){e.preventDefault();onUp(e)},{passive:false});
}

function onDown(e){
  var pos=getPos(e,PLAN_CANVAS);
  PLAN.dragging=true;
  PLAN.dragStart=pos;

  if(PLAN.tool==="camera"){
    // Place camera
    var newCam={x:pos.x,y:pos.y,angle:0,fov:PLAN.fovAngle,color:CAM_COLORS[camColorIdx%CAM_COLORS.length],label:PLAN.cameras.length+1};
    PLAN.cameras.push(newCam);
    camColorIdx++;
    PLAN.selected={type:"camera",idx:PLAN.cameras.length-1};
    PLAN.tool="select"; // switch to select so user can drag to orient
    updateToolUI();
    drawPlan();
  } else if(PLAN.tool==="arrow"){
    PLAN.arrowStart={x:pos.x,y:pos.y,cx:pos.x,cy:pos.y};
    drawPlan();
  } else if(PLAN.tool==="select"){
    var hi=hitCamera(pos.x,pos.y);
    if(hi>=0){
      PLAN.selected={type:"camera",idx:hi};
    } else {
      // Check arrows
      var ha=-1;
      PLAN.arrows.forEach(function(a,i){
        var dx=a.x2-a.x1,dy=a.y2-a.y1,len=Math.sqrt(dx*dx+dy*dy);
        if(len<1)return;
        var t=((pos.x-a.x1)*dx+(pos.y-a.y1)*dy)/(len*len);
        t=Math.max(0,Math.min(1,t));
        var px=a.x1+t*dx,py=a.y1+t*dy;
        if(Math.sqrt((pos.x-px)*(pos.x-px)+(pos.y-py)*(pos.y-py))<12)ha=i;
      });
      PLAN.selected=ha>=0?{type:"arrow",idx:ha}:null;
    }
    drawPlan();
  } else if(PLAN.tool==="delete"){
    var hd=hitCamera(pos.x,pos.y);
    if(hd>=0){
      PLAN.cameras.splice(hd,1);
      // Relabel
      PLAN.cameras.forEach(function(c,i){c.label=i+1});
      PLAN.selected=null;drawPlan();
    }
  }
}

function onMove(e){
  if(!PLAN.dragging)return;
  var pos=getPos(e,PLAN_CANVAS);

  if(PLAN.tool==="arrow"&&PLAN.arrowStart){
    PLAN.arrowStart.cx=pos.x;PLAN.arrowStart.cy=pos.y;
    drawPlan();
  } else if(PLAN.tool==="select"&&PLAN.selected){
    if(PLAN.selected.type==="camera"){
      var cam=PLAN.cameras[PLAN.selected.idx];
      if(cam){
        // If far from camera center, rotate; if close, move
        var dx=pos.x-cam.x,dy=pos.y-cam.y;
        var dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>20){
          cam.angle=Math.atan2(dy,dx)*180/Math.PI;
        } else {
          cam.x=pos.x;cam.y=pos.y;
        }
        drawPlan();
      }
    } else if(PLAN.selected.type==="arrow"){
      var arr=PLAN.arrows[PLAN.selected.idx];
      if(arr){
        var ddx=pos.x-PLAN.dragStart.x,ddy=pos.y-PLAN.dragStart.y;
        arr.x1+=ddx;arr.y1+=ddy;arr.x2+=ddx;arr.y2+=ddy;
        PLAN.dragStart=pos;
        drawPlan();
      }
    }
  }
}

function onUp(e){
  if(!PLAN.dragging){return}
  var pos=getPos(e,PLAN_CANVAS);

  if(PLAN.tool==="arrow"&&PLAN.arrowStart){
    var dx=pos.x-PLAN.arrowStart.x,dy=pos.y-PLAN.arrowStart.y;
    if(Math.sqrt(dx*dx+dy*dy)>15){
      PLAN.arrows.push({x1:PLAN.arrowStart.x,y1:PLAN.arrowStart.y,x2:pos.x,y2:pos.y,color:"#1565c0"});
    }
    PLAN.arrowStart=null;
  }
  PLAN.dragging=false;
  drawPlan();
}

  if(!navigator.clipboard||!navigator.clipboard.read){toast("Sur iPhone : appuyez longuement sur l'image → Copier, revenez ici");return}
  navigator.clipboard.read().then(function(items){
    var found=false;
    items.forEach(function(item){item.types.forEach(function(type){
      if(type.match(/^image\//)){
        item.getType(type).then(function(blob){var r=new FileReader();r.onload=function(e){S.imgs[cat].push({name:"Image collée",src:e.target.result,type:type,cap:""});render();toast("✓ Image collée !")};r.readAsDataURL(blob)});found=true;

  }).catch(function(){toast("Copiez l'image dans DMSS puis revenez ici")});

    '<textarea oninput="upd(\'risque\',this.value)" placeholder="Ex : L\'établissement a subi 3 tentatives de cambriolage...">'+h(S.f.risque)+'</textarea></div></div></div>';
  return html;
}

function rs3(){
  return '<div class="card"><div class="ch"><div class="ct">Paramètres techniques</div></div><div class="cb">'+
    '<div class="row"><div class="field"><label class="fl">Conservation (jours)</label><input type="number" inputmode="numeric" value="'+h(S.f.conserv)+'" oninput="upd(\'conserv\',this.value)"></div>'+
    '<div class="field"><label class="fl">Personnes habilitées</label><input type="number" inputmode="numeric" value="'+h(S.f.habilit)+'" oninput="upd(\'habilit\',this.value)"></div></div>'+
    '<div style="background:#f8f6f2;border-radius:10px;padding:0 14px">'+
    '<div class="tr"><div class="tl">Enregistrement des images</div><div class="tsw '+(S.f.enreg?"on":"")+'" onclick="upd(\'enreg\','+(!S.f.enreg)+')"></div></div>'+
    '<div class="tr"><div><div class="tl">Télésurveillance</div><div class="ts">Renvoi vers un centre de télésurveillance</div></div><div class="tsw '+(S.f.tele?"on":"")+'" onclick="upd(\'tele\','+(!S.f.tele)+')"></div></div>'+
    '<div class="tr"><div><div class="tl">Installateur certifié</div></div><div class="tsw '+(S.f.certif?"on":"")+'" onclick="upd(\'certif\','+(!S.f.certif)+')"></div></div></div>'+
    (!S.f.certif?'<div class="alert aw" style="margin-top:10px">⚠️ Le questionnaire de conformité (Annexe 1) sera obligatoire.</div>':'')+
    '<div class="field" style="margin-top:14px"><label class="fl">Nom de l\'installateur</label><input type="text" value="'+h(S.f.installateur)+'" oninput="upd(\'installateur\',this.value)" placeholder="Ex : ADS Sécurité SARL"></div>'+
    '<div class="field"><label class="fl">Observations</label><textarea oninput="upd(\'obs\',this.value)" placeholder="Informations supplémentaires...">'+h(S.f.obs)+'</textarea></div></div></div>';
}

function rs4(){
  var planSaved=S.imgs.plan_masse.length>0;
  var tot=countI();
  return '<div class="card"><div class="ch"><div class="ct">Plan de masse interactif</div>'+
    '<div class="cs">Dessinez les positions caméras sur votre plan</div></div>'+

    // PLAN EDITOR
    '<div class="plan-editor">'+
      '<div class="plan-toolbar">'+
        '<button class="tool-btn'+(PLAN.tool==="camera"?" active":"")+'" data-tool="camera" onclick="setTool(\'camera\')">📷 Caméra</button>'+
        '<div class="tool-sep"></div>'+
        '<button class="tool-btn'+(PLAN.tool==="arrow"?" active":"")+'" data-tool="arrow" onclick="setTool(\'arrow\')">➜ Flèche</button>'+
        '<div class="tool-sep"></div>'+
        '<button class="tool-btn'+(PLAN.tool==="select"?" active":"")+'" data-tool="select" onclick="setTool(\'select\')">✋ Déplacer</button>'+
        '<div class="tool-sep"></div>'+
        '<button class="tool-btn'+(PLAN.tool==="delete"?" active":"")+'" data-tool="delete" onclick="setTool(\'delete\')">🗑 Suppr.</button>'+
      '</div>'+

      '<div class="plan-canvas-wrap" style="height:280px">'+
        '<canvas id="planCanvas" style="cursor:crosshair"></canvas>'+
        (!PLAN.bgImage&&PLAN.cameras.length===0?'<div class="plan-hint-overlay"><div class="plan-hint-box">📷 Appuyez sur <strong>Caméra</strong><br>puis tapez sur le plan pour placer<br><br>Importez d\'abord votre plan ci-dessous</div></div>':'')+
      '</div>'+

      '<div class="fov-slider">'+
        '<span>Angle FOV :</span>'+
        '<input type="range" min="30" max="120" value="'+PLAN.fovAngle+'" oninput="updateFOV(this.value)" style="flex:1">'+
        '<span id="fovVal">'+PLAN.fovAngle+'°</span>'+
      '</div>'+

      '<div class="plan-actions">'+
        '<label class="plan-action-btn" style="cursor:pointer">🗺 Importer plan<input type="file" accept="image/*" style="display:none" onchange="setPlanBg(this.files[0])"></label>'+
        '<button class="plan-action-btn" onclick="clearPlan()">🗑 Tout effacer</button>'+
        '<button class="plan-action-btn primary" id="exportBtn" onclick="exportPlan()">'+(planSaved?'✓ Plan sauvegardé':'💾 Sauvegarder le plan')+'</button>'+
      '</div>'+
    '</div>'+

    // OTHER PHOTOS
    '<div class="cb">'+
      '<div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px">📎 Photos complémentaires</div>'+
      CATS.map(function(c){return izone(c.key,c.title,c.icon,c.hint)}).join("")+
    '</div></div>';
}

function rs5(){
  if(S.loading)return '<div class="loading"><div class="lspinner"></div><div style="font-size:15px;font-weight:600">Rédaction du rapport…</div></div>';
  if(!S.rapport){
    var tot=countI();
    return '<div class="card"><div class="ch"><div class="ct">Récapitulatif</div></div><div class="cb">'+
      '<div class="rg">'+
        '<div class="rc"><div class="rk">Établissement</div><div class="rv">'+(h(S.f.nom)||"—")+'</div></div>'+
        '<div class="rc"><div class="rk">Caméras</div><div class="rv">'+(S.f.cams||"—")+(parseInt(S.f.cams)>=8?" ⚠️":"")+'</div></div>'+
        '<div class="rc"><div class="rk">Caméras dessinées</div><div class="rv">'+PLAN.cameras.length+' sur le plan</div></div>'+
        '<div class="rc"><div class="rk">Plans & Photos</div><div class="rv">'+tot+' fichier'+(tot>1?"s":"")+'</div></div>'+
      '</div>'+
      '<button class="btn-gen" onclick="genRapport()">✦ Générer le dossier complet</button>'+
      '</div></div>';
  }
  var tabC=S.tab==="rapport"
    ?'<div class="rout"><div class="rtbar"><div class="rttitle">RAPPORT · '+h(S.f.nom).toUpperCase()+'</div>'+
      '<button class="bsmall" onclick="navigator.clipboard.writeText(S.rapport).then(function(){toast(\'✓ Copié !\')})">Copier</button></div>'+
      '<div class="rcontent">'+h(S.rapport)+'</div></div>'
    :'<div class="card">'+S.cl.map(function(item){
        return '<div class="cli"><div class="clcirc"></div><div><div class="cldoc">'+h(item.doc)+'</div><div class="cldesc">'+h(item.desc)+'</div></div></div>';
      }).join("")+'<div style="padding:12px 16px"><div class="alert aw">💡 <div><strong>Délai :</strong> 3 à 4 mois. Autorisation valable 5 ans.</div></div></div></div>';

  return '<div class="ios-hint">📱 <strong>Sur iPhone :</strong> appuyez sur le bouton → le dossier s\'ouvre → <strong>Partager → Imprimer → Partager → Enregistrer en PDF</strong></div>'+
    '<button class="btn-pdf" onclick="openDossier()">📄 Ouvrir le dossier complet</button>'+
    '<div class="alert ag" style="margin-bottom:12px">✅ <div>Page de garde · infos · rapport · plan avec caméras · photos · checklist.</div></div>'+
    '<div class="tabs"><button class="tab '+(S.tab==="rapport"?"active":"")+'" onclick="S.tab=\'rapport\';render()">📄 Rapport</button>'+
    '<button class="tab '+(S.tab==="checklist"?"active":"")+'" onclick="S.tab=\'checklist\';render()">✅ Checklist <span class="badge">'+S.cl.length+'</span></button></div>'+
    tabC+'<button class="btn-new" onclick="if(confirm(\'Nouveau dossier ?\'))location.reload()">+ Nouveau dossier</button>';
}

function render(){
  renderSteps();renderNav();
  var steps=[rs0,rs1,rs2,rs3,rs4,rs5];
  document.getElementById("mc").innerHTML=steps[S.step]();
  window.scrollTo(0,0);
  if(S.step===4){
    setTimeout(function(){
      initCanvas();
      // Restore plan bg if exists
      if(PLAN.bgSrc&&!PLAN.bgImage){
        var img=new Image();
        img.onload=function(){PLAN.bgImage=img;drawPlan()};
        img.src=PLAN.bgSrc;
      }
    },50);
  }
}

document.addEventListener("paste",function(e){
  var items=e.clipboardData&&e.clipboardData.items;if(!items)return;
  for(var i=0;i<items.length;i++){
    if(items[i].type.match(/^image\//)){
      var blob=items[i].getAsFile();if(!blob)continue;
      (function(b){var r=new FileReader();r.onload=function(ev){
        S.imgs.dmss.push({name:"Image collée",src:ev.target.result,type:b.type,cap:""});
        if(S.step!==4)S.step=4;render();toast("✓ Image collée !");
      };r.readAsDataURL(b)})(blob);
    }
  }
});

render();
</script>
</body>
</html>
